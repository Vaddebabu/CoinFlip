<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Coin Toss</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle,#111,#000);
font-family:Segoe UI;
color:white;
text-align:center;
}

.container{
background:rgba(255,255,255,.05);
padding:50px;
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(255,215,0,.4);
}

.coin{
width:180px;
height:180px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:bold;
color:black;
background:radial-gradient(circle,#fff3a0,#ffd700,#b8860b);
box-shadow:0 0 30px gold,inset 0 0 20px rgba(255,255,255,.8);
}

.flip{
animation:spin 1.4s ease;
}

@keyframes spin{
0%{transform:rotateY(0)}
50%{transform:rotateY(720deg)}
100%{transform:rotateY(1440deg)}
}

.result{
margin-top:25px;
font-size:22px;
color:#ffd700;
min-height:30px;
}

.note{
margin-top:15px;
opacity:.6;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Flip The Coin</h1>

<div id="coin" class="coin">?</div>

<div id="result" class="result">Tap anywhere</div>

<div class="note">
1 Finger Tap → Tails<br>
3 Finger Tap → Heads
</div>

</div>

<script>

const coin=document.getElementById("coin")
const result=document.getElementById("result")

function flip(side){

coin.classList.add("flip")
result.textContent="Flipping..."

setTimeout(()=>{

coin.textContent=side.toUpperCase()
result.textContent="Result → "+side.toUpperCase()

coin.classList.remove("flip")

},1300)

}

/* TOUCH DETECTION */

document.addEventListener("touchstart",function(e){

const fingers=e.touches.length

if(fingers===3){
flip("heads")
}else if(fingers===1){
flip("tails")
}

})

</script>

</body>
</html>
