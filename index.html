<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Odd Even Coin Flip</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle,#111,#000);
font-family:Segoe UI;
color:white;
text-align:center;
}

.container{
background:rgba(255,255,255,.05);
padding:50px;
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(255,215,0,.4);
}

.coin{
width:180px;
height:180px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
color:black;
background:radial-gradient(circle,#fff3a0,#ffd700,#b8860b);
box-shadow:0 0 30px gold,inset 0 0 20px rgba(255,255,255,.8);
}

.flip{
animation:spin 1.6s ease;
}

@keyframes spin{
0%{transform:rotateY(0)}
50%{transform:rotateY(720deg)}
100%{transform:rotateY(1440deg)}
}

button{
margin-top:30px;
padding:14px 30px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:linear-gradient(45deg,#ff9800,#ff5722);
color:white;
}

.result{
margin-top:25px;
font-size:22px;
color:#ffd700;
}

</style>
</head>

<body>

<div class="container">

<h1>Flip The Coin</h1>

<div id="coin" class="coin">?</div>

<button onclick="flipCoin()">Flip Coin</button>

<div id="result" class="result"></div>

</div>

<script>

let flipCount=0

const coin=document.getElementById("coin")
const result=document.getElementById("result")

function flipCoin(){

flipCount++

coin.classList.add("flip")

result.textContent=""

/* RESULT AFTER SPIN */

setTimeout(()=>{

if(flipCount%2===1){

coin.textContent="HEADS"


}else{

coin.textContent="TAILS"


}

coin.classList.remove("flip")

},1600)

}

</script>

</body>
</html>
