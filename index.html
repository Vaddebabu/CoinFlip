<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cheating Coin Toss</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle,#111,#000);
font-family:Segoe UI;
color:white;
text-align:center;
user-select:none;
}

.container{
background:rgba(255,255,255,.05);
padding:50px;
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 0 40px rgba(255,215,0,.4);
}

.coin{
width:180px;
height:180px;
border-radius:50%;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
color:black;
background:radial-gradient(circle,#fff3a0,#ffd700,#b8860b);
box-shadow:0 0 30px gold,inset 0 0 20px rgba(255,255,255,.8);
}

.flip{
animation:spin 1.5s ease;
}

@keyframes spin{
0%{transform:rotateY(0)}
50%{transform:rotateY(720deg)}
100%{transform:rotateY(1440deg)}
}

.result{
margin-top:25px;
font-size:22px;
color:#ffd700;
min-height:30px;
}

.note{
margin-top:15px;
opacity:.6;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Flip The Coin</h1>

<div id="coin" class="coin">?</div>

<div id="result" class="result">Tap anywhere</div>

<div class="note">
</div>

</div>

<script>

const coin=document.getElementById("coin")
const result=document.getElementById("result")

let tapTimer=null

function flip(side){

coin.classList.add("flip")
result.textContent="Flipping..."

setTimeout(()=>{

if(side==="heads"){
coin.textContent="HEADS"
result.textContent="Result → HEADS"
}
else{
coin.textContent="TAILS"
result.textContent="Result → TAILS"
}

coin.classList.remove("flip")

},1500)

}

/* SINGLE TAP */

document.addEventListener("click",function(){

if(tapTimer){
clearTimeout(tapTimer)
tapTimer=null

/* DOUBLE TAP */

flip("heads")

}else{

tapTimer=setTimeout(function(){

flip("tails")
tapTimer=null

},300)

}

})

</script>

</body>
</html>
